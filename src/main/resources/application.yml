server:
  port: 8080

spring:
  application:
    name: employee-service

  jackson:
    date-format: dd-MM-yyyy
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:h2:mem:employeesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.example.employeeservice: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics